[mod-name]
train-foundry=Train Foundry

[mod-description]
train-foundry=A large train foundry building that assembles complete trains from blueprint templates: import a train blueprint, queue it, let logistic bots deliver the parts, and watch the finished train fuel up and drive off onto your rail network on its own.

[entity-name]
train-foundry=Train Foundry
tf-input=Train Foundry (loading dock)
tf-signal=Train Foundry (exit signal)

[entity-description]
train-foundry=Assembles complete trains from blueprint templates. Place the exit gate (west, left side) onto the end of a rail line: a straight east-west rail is required under the exit apron. Feed the parts with inserters anywhere along the edge — they all land in one shared internal stock.

[tf-msg]
need-rails=The exit gate must be placed onto the end of a rail line (straight east-west rail under the apron)
import-no-foundry=Hover a Train Foundry with the blueprint in hand
import-not-blueprint=Hold a blueprint in hand (not a book: take the blueprint out of it)
import-empty=This blueprint is empty
import-no-train=No locomotive or wagon in this blueprint
import-not-straight=The train in the blueprint must be placed on a straight track
import-ok=Template "__1__" saved: __2__ locomotive(s) + __3__ wagon(s), schedule included
import-ok-nosched=Template "__1__" saved: __2__ locomotive(s) + __3__ wagon(s), no schedule
spawn-missing=Missing components in the internal stock: __1__
spawn-track-occupied=The internal track is occupied
spawn-exit-blocked=The exit block is not clear
spawn-too-long=Train too long for the foundry (5 vehicles maximum)
spawn-failed=Failed to build the train
spawn-ok-departed="__1__" built — departing!
spawn-ok-manual="__1__" built and delivered on the track (no schedule in the blueprint: train left in manual mode)

