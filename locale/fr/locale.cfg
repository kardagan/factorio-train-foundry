[entity-description]
train-foundry=Assemble des trains complets à partir de modèles de blueprints. Raccordez votre réseau ferré à la voie de sortie à gauche (ouest) ; une sortie à droite (est) s'active dans la fenêtre de la fonderie. Alimentez les pièces avec des bras n'importe où sur le pourtour — tout arrive dans une réserve interne unique.

[tf-msg]
need-rails=La porte de sortie doit être posée sur l'extrémité d'une voie (rail droit est-ouest sous le parvis)
one-per-surface=Une seule fonderie à trains par planète (ajoutez des extensions à droite pour des trains plus longs)
extension-need-master=Une extension doit être accolée à droite d'une fonderie à trains
master-has-extensions=Retirez d'abord les extensions (à droite) avant de miner la fonderie
no-foundry-here=Aucune fonderie à trains sur cette planète
import-no-foundry=Survolez une Fonderie à trains avec le blueprint en main
import-not-blueprint=Prenez un blueprint en main (pas un livre : sortez-en le blueprint)
import-empty=Ce blueprint est vide
import-no-train=Aucune locomotive ni wagon dans ce blueprint
import-not-straight=Le train du blueprint doit être posé sur une voie droite
import-not-clean=Ce blueprint contient autre chose qu'un train : __1__
import-too-long=Train trop long : __1__ véhicules maximum (locomotives + wagons)
bp-chest-full=Coffre à plans plein
import-ok=Template « __1__ » enregistré : __2__ locomotive(s) + __3__ wagon(s), itinéraire inclus
import-ok-nosched=Template « __1__ » enregistré : __2__ locomotive(s) + __3__ wagon(s), sans itinéraire
spawn-missing=Composants manquants dans la réserve : __1__
spawn-track-occupied=La voie interne est occupée
spawn-exit-blocked=Le bloc de sortie n'est pas libre
spawn-too-long=Train trop long pour la fonderie (5 véhicules maximum)
spawn-failed=Échec de la construction du train
spawn-ok-departed=« __1__ » construit — départ !
spawn-ok-manual=« __1__ » construit et livré sur la voie (pas de schedule dans le blueprint : train laissé en manuel)

