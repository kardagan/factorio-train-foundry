[mod-name]
train-foundry=Train Foundry

[mod-description]
train-foundry=Une grande fonderie à trains qui assemble des trains complets à partir de modèles de blueprints : importez un blueprint de train, mettez-le en file d'attente, alimentez les pièces avec des bras, et regardez le train fini faire le plein et partir tout seul sur votre réseau ferroviaire.

