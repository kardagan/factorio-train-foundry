[mod-name]
train-foundry=Train Foundry

[mod-description]
train-foundry=Une grande fonderie à trains qui assemble des trains complets à partir de modèles de blueprints : importez un blueprint de train, mettez-le en file d'attente, laissez les robots logistiques livrer les pièces, et regardez le train fini faire le plein et partir tout seul sur votre réseau ferroviaire.

[entity-name]
train-foundry=Fonderie à trains
tf-input=Fonderie à trains (quai de chargement)
tf-signal=Fonderie à trains (signal de sortie)

[entity-description]
train-foundry=Assemble des trains complets à partir de modèles de blueprints. Posez la porte de sortie (à l'ouest, à gauche) sur l'extrémité d'une voie ferrée : il faut un rail droit est-ouest sous le parvis de sortie. Alimentez les pièces avec des bras n'importe où sur le pourtour — tout arrive dans une réserve interne unique.

[tf-msg]
need-rails=La porte de sortie doit être posée sur l'extrémité d'une voie (rail droit est-ouest sous le parvis)
import-no-foundry=Survolez une Fonderie à trains avec le blueprint en main
import-not-blueprint=Prenez un blueprint en main (pas un livre : sortez-en le blueprint)
import-empty=Ce blueprint est vide
import-no-train=Aucune locomotive ni wagon dans ce blueprint
import-not-straight=Le train du blueprint doit être posé sur une voie droite
import-ok=Template « __1__ » enregistré : __2__ locomotive(s) + __3__ wagon(s), itinéraire inclus
import-ok-nosched=Template « __1__ » enregistré : __2__ locomotive(s) + __3__ wagon(s), sans itinéraire
spawn-missing=Composants manquants dans la réserve : __1__
spawn-track-occupied=La voie interne est occupée
spawn-exit-blocked=Le bloc de sortie n'est pas libre
spawn-too-long=Train trop long pour la fonderie (5 véhicules maximum)
spawn-failed=Échec de la construction du train
spawn-ok-departed=« __1__ » construit — départ !
spawn-ok-manual=« __1__ » construit et livré sur la voie (pas de schedule dans le blueprint : train laissé en manuel)

[item-name]
train-foundry=Fonderie à trains

[item-description]
train-foundry=Un grand bâtiment qui assemble des trains complets à partir de modèles de blueprints et les envoie sur votre réseau ferroviaire.

[recipe-name]
train-foundry=Fonderie à trains

[technology-name]
train-foundry=Fonderie à trains

[technology-description]
train-foundry=Un bâtiment qui assemble des trains complets à partir de modèles de blueprints, en requestant les pièces auprès du réseau logistique et en expédiant les trains finis sur le réseau ferroviaire.

[tf-gui]
slot-tooltip=Cliquez ici avec un blueprint de train en main pour l'enregistrer comme template
drop-hint=Prenez un blueprint de train en main puis cliquez sur le slot.
templates-title=Templates
template-row=__1__ — __2__ locomotive(s) + __3__ wagon(s)
no-templates=Aucun template pour l'instant.
delete-template=Supprimer ce template
spawn-template=Construire ce train maintenant (composants pris dans la réserve)
stock-title=Réserve
stock-empty=Réserve vide.
open-stock=Déposer / retirer
params-title=Paramètres
params-build=Construire
params-cancel=Annuler
